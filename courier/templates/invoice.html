<!DOCTYPE html>
<html lang="en">
<head>
    {% include 'user_navigation.html' %}
    <meta charset="UTF-8">
    <title>Title</title>
<style>
    .d1{
        font-weight:bold;
        color:red;
    }
    .d2{
        font-size:20px;
        font-weight:bold;
    }
</style>

</head>
<body>
<marquee behavior="alternate" style="font-family: 'Monotype Corsiva'; font-size:25px; color:darkcyan; background-color:black; font-weight:bold; margin-top:1%">
    Generate Invoice
</marquee>

<div class="container" style="height:400px;width:900px;padding:50px;border:4px solid cyan;border-radius:30%;background:yellow;">
<div class="row">
    <div class="col-4"></div>
    <div class="col-8">
    <label class="d1">User Name: </label> <label class="d2">{{data.uname}}</label><br>
    <label class="d1">User Email: </label> <label class="d2">{{data.uemail}}</label><br>
    <label class="d1">Contact: </label> <label class="d2">{{data.contact}}</label><br>
    <label class="d1">Amount: </label> <label class="d2">{{data.amount}}</label><br>
    <label class="d1">Date time: </label> <label class="d2">{{data.dt}}</label><br>
    <label class="d1">Transaction Mode: </label> <label class="d2">{{data.mode}}</label><br>
    <label class="d1">Transaction Status: </label> <label class="d2">{{data.status}}</label><br>
    <span style="padding-left:30px;"></span><a href="{% url 'download' data.p_id %}" class="btn btn-primary">Download</a> | <a href="{% url 'view_my_parcel' %}" class="btn btn-dark">Back</a>
    </div>
</div>
</div>
</body>
</html>
