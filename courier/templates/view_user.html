{% include 'admin_navigation.html' %}

<marquee behavior="alternate" class="mt-3" style="background:black;font-size:30px;color:cyan;font-family:calibiry;">
    View User Page
</marquee>
<div class="container-fluid">
<table class="table mt-2">
    <tr bgcolor="cyan">
        <th>S.No.</th>
        <th>Name</th>
        <th>Email</th>
        <th>Contact</th>
        <th>Gender</th>
        <th>DOB</th>
        <th>Address</th>
        <th>Profile</th>
        <th>Action</th>
    </tr>
    {% for i in data %}
        <tr style="color:black;font-size:20px;" bgcolor="lightgreen">
            <td>{{forloop.counter}}</td>
            <td>{{i.user.first_name}} {{i.user.last_name}}</td>
            <td>{{i.user}}</td>
            <td>{{i.mobile}}</td>
            <td>{{i.gender}}</td>
            <td>{{i.dob}}</td>
            <td style="color:blue;">{{i.address}}</td>
            <td> <img src="{{i.image.url}}" width="120" height="100" style="border-radius:50%;"></td>
            <td valign="middle"><a href="{% url 'delete_user' i.user.id %}" class="btn btn-danger">Delete</a></td>
        </tr>
    {% endfor %}
</table>
</div>
