{% include 'navigation.html' %}

<form action="" method="post">
    {% csrf_token %}
    <div class="container mt-4">
        <div class="row">
            <div class="col-2"></div>
            <div class="col-8">
                <label for="">
                    Full Name:
                </label>
                <input type="text" name="fname" class="form-control" placeholder="Enter Your Full Name">
            </div>
        </div>
        <div class="row">
            <div class="col-2"></div>
            <div class="col-8">
                <label for="">
                    Email:
                </label>
                <input type="email" name="email" class="form-control" placeholder="Enter Your Email ID">
            </div>
        </div>
        <div class="row">
            <div class="col-2"></div>
            <div class="col-8">
                <label for="">
                    Contact:
                </label>
                <input type="text" name="mobile" class="form-control" placeholder="Enter Your Mobile Number">
            </div>
        </div>
        <div class="row">
            <div class="col-2"></div>
            <div class="col-8">
                <label for="">
                    Purpose:
                </label>
                <input type="text" name="msg" class="form-control" placeholder="Purpose To Contact">
            </div>
        </div>
        <br>
        <center>
            <input type="submit" class="btn btn-primary btn-lg"> | <a href="{% url 'index' %}" class="btn btn-dark btn-lg">Cancel</a>
        </center>
    </div>
</form>

{% if error == "no" %}
<script>
    alert("Contact Detail Uploaded Successfully")
    window.location = ('{% url 'index' %}')
</script>
{% endif %}

{% if error == "yes" %}
<script>
    alert("Something went wrong, Try Again")
</script>
{% endif %}
